<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Кадровый центр здравоохранения РК</title>
    <link rel="icon" type="image/x-icon" href="/img/favicon.ico">
    <link rel="shortcut icon" href="/img/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>

<body>

    <!-- Шапка -->
    <header class="header">
        <div class="container header__inner">
            <a href="../index.html" class="logo">
                <span class="logo__icon">
                    <img src="../img/logo.png" alt="Кадровый центр" width="50" height="50">
                </span>
                <span class="logo__text">Кадровый центр</span>
            </a>
            <nav class="nav" id="mainNav">
                <a href="vacancies.html" class="nav__link">Вакансии</a>
                <a href="organizations.html" class="nav__link">Организации</a>
                <a href="documents.html" class="nav__link">Документы</a>
                <a href="press.html" class="nav__link">Пресс-служба</a>
                <a href="login.html" class="btn btn--outline nav__btn">Войти</a>
            </nav>
            <button class="burger" id="burgerBtn" aria-label="Открыть меню">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </header>

    <!-- Форма входа -->
    <main class="auth-page">
        <div class="auth-card">
            <div class="auth-card__icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
                    <polyline points="10 17 15 12 10 7"></polyline>
                    <line x1="15" y1="12" x2="3" y2="12"></line>
                </svg>
            </div>
            <h1 class="auth-card__title">Вход в личный кабинет</h1>
            <p class="auth-card__subtitle">Войдите, чтобы управлять резюме или вакансиями</p>

            <div class="auth-error" id="authError">
                Неверный email или пароль. Попробуйте снова.
            </div>

            <form id="loginForm">
                <div class="input-group">
                    <input type="email" id="loginEmail" placeholder=" " required autocomplete="email">
                    <label for="loginEmail">Email</label>
                </div>
                <div class="input-group">
                    <input type="password" id="loginPassword" placeholder=" " required autocomplete="current-password">
                    <label for="loginPassword">Пароль</label>
                </div>
                <button type="submit" class="btn btn--primary btn--full">
                    Войти
                </button>
                <a href="#" class="auth-card__forgot" id="forgotLink">Забыли пароль?</a>
            </form>

            <p class="auth-card__footer">
                Ещё нет аккаунта? <a href="register.html">Зарегистрироваться</a>
            </p>
        </div>
    </main>

    <!-- Скрипты -->
    <script src="../js/main.js"></script>
    <script src="js/login.js"></script>

</body>

</html>
