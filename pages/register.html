<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — Кадровый центр здравоохранения РК</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>

<body>

    <!-- Шапка -->
    <header class="header">
        <div class="container header__inner">
            <a href="../index.html" class="logo">
                <span class="logo__icon">
                    <img src="../img/logo.png" alt="Кадровый центр" width="50" height="50">
                </span>
                <span class="logo__text">Кадровый центр</span>
            </a>
            <nav class="nav" id="mainNav">
                <a href="vacancies.html" class="nav__link">Вакансии</a>
                <a href="organizations.html" class="nav__link">Организации</a>
                <a href="documents.html" class="nav__link">Документы</a>
                <a href="press.html" class="nav__link">Пресс-служба</a>
                <a href="login.html" class="btn btn--outline nav__btn">Войти</a>
            </nav>
            <button class="burger" id="burgerBtn" aria-label="Открыть меню">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </header>

    <!-- Форма регистрации -->
    <main class="auth-page">
        <div class="auth-card">
            <div class="auth-card__icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                    <circle cx="8.5" cy="7" r="4"></circle>
                    <line x1="20" y1="8" x2="20" y2="14"></line>
                    <line x1="23" y1="11" x2="17" y2="11"></line>
                </svg>
            </div>
            <h1 class="auth-card__title">Регистрация</h1>
            <p class="auth-card__subtitle">Создайте аккаунт для доступа к сервису</p>

            <div class="auth-error" id="authError"></div>

            <form id="registerForm">
                <!-- Выбор роли -->
                <div class="role-selector">
                    <label class="role-option">
                        <input type="radio" name="role" value="applicant" checked>
                        <span class="role-option__card">
                            <span class="role-option__icon">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                    <circle cx="12" cy="7" r="4"></circle>
                                </svg>
                            </span>
                            <span class="role-option__label">Соискатель</span>
                        </span>
                    </label>
                    <label class="role-option">
                        <input type="radio" name="role" value="employer">
                        <span class="role-option__card">
                            <span class="role-option__icon">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect>
                                    <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"></path>
                                </svg>
                            </span>
                            <span class="role-option__label">Работодатель</span>
                        </span>
                    </label>
                </div>

                <!-- Поля для всех -->
                <div class="input-group">
                    <input type="text" id="regFullName" placeholder=" " required>
                    <label for="regFullName">ФИО</label>
                </div>
                <div class="input-group">
                    <input type="tel" id="regPhone" placeholder=" " required>
                    <label for="regPhone">Номер телефона</label>
                </div>
                <div class="input-group">
                    <input type="email" id="regEmail" placeholder=" " required autocomplete="email">
                    <label for="regEmail">Email</label>
                </div>
                <div class="input-group">
                    <input type="password" id="regPassword" placeholder=" " required autocomplete="new-password">
                    <label for="regPassword">Пароль</label>
                </div>

                <!-- Поля только для работодателя -->
                <div id="employerFields" style="display: none;">
                    <div class="input-group">
                        <select id="regOrganization" required>
                            <option value="">Выберите учреждение...</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <input type="text" id="regPosition" placeholder=" ">
                        <label for="regPosition">Ваша должность</label>
                    </div>
                </div>

                <button type="submit" class="btn btn--primary btn--full">
                    Зарегистрироваться
                </button>
            </form>

            <p class="auth-card__footer">
                Уже есть аккаунт? <a href="login.html">Войти</a>
            </p>
        </div>
    </main>

    <!-- Скрипты -->
    <script src="../js/main.js"></script>
    <script src="js/register.js"></script>

</body>

</html>
